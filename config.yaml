# ────────────────────────────────────────────
# 전략 선택: ma_cross / rsi / bollinger / volatility_breakout
# ────────────────────────────────────────────
strategy: bollinger

# ────────────────────────────────────────────
# 거래 시장
# KR: 한국만 / US: 미국만 / BOTH: 양쪽
# ────────────────────────────────────────────
market: BOTH

# ────────────────────────────────────────────
# 종목 탐색 모드
# false: 감시 목록(watchlist)에서만 탐색
# true : 거래량 상위 전체 시장에서 자동 탐색
# ────────────────────────────────────────────
use_dynamic_universe: true
use_dynamic_universe_us: true

# ────────────────────────────────────────────
# 모의투자 여부 (true: 모의투자, false: 실전투자)
# ────────────────────────────────────────────
virtual: false

# ────────────────────────────────────────────
# 실행 주기 (분 단위)
# ────────────────────────────────────────────
interval_minutes: 5

# ────────────────────────────────────────────
# 조건 검색 설정
# ────────────────────────────────────────────
screener:
  min_universe_volume: 100000  # 동적 탐색 시 유니버스 최소 거래량
  min_volume: 500000           # 스크리너 최소 거래량
  min_price: 5000              # 최소 주가
  max_price: 200000            # 최대 주가
  max_stocks: 5                # 최대 선택 종목 수
  watchlist:               # 감시 종목 코드 목록
    - "005930"             # 삼성전자
    - "000660"             # SK하이닉스
    - "035420"             # NAVER
    - "035720"             # 카카오
    - "051910"             # LG화학
    - "006400"             # 삼성SDI
    - "207940"             # 삼성바이오로직스
    - "068270"             # 셀트리온
    - "105560"             # KB금융
    - "055550"             # 신한지주
    - "003550"             # LG
    - "066570"             # LG전자
    - "028260"             # 삼성물산
    - "012330"             # 현대모비스
    - "005380"             # 현대차

# ────────────────────────────────────────────
# 미국 주식 감시 종목 (심볼.거래소 형식: NASD/NYSE/AMEX)
# ────────────────────────────────────────────
us_screener:
  min_volume: 1000000          # 최소 거래량
  max_stocks: 5                # 최대 선택 종목 수
  watchlist:
    - "AAPL.NASD"              # Apple
    - "MSFT.NASD"              # Microsoft
    - "NVDA.NASD"              # NVIDIA
    - "TSLA.NASD"              # Tesla
    - "AMZN.NASD"              # Amazon
    - "GOOGL.NASD"             # Alphabet
    - "META.NASD"              # Meta
    - "NFLX.NASD"              # Netflix
    - "AMD.NASD"               # AMD
    - "INTC.NASD"              # Intel

# ────────────────────────────────────────────
# 리스크 관리
# ────────────────────────────────────────────
risk:
  max_buy_amount: 500000       # KR 1회 최대 매수금액 (원)
  us_max_buy_amount_usd: 50   # US 1회 최대 매수금액 (USD)
  stop_loss_pct: -5.0          # 손절 기준 (%)
  take_profit_pct: 10.0        # 익절 기준 (%)

# ────────────────────────────────────────────
# 전략별 파라미터
# ────────────────────────────────────────────
ma_cross:
  short_period: 5          # 단기 이동평균 기간
  long_period: 20          # 장기 이동평균 기간

rsi:
  period: 14               # RSI 계산 기간
  oversold: 30             # 매수 기준 (과매도)
  overbought: 70           # 매도 기준 (과매수)

bollinger:
  period: 20               # 볼린저밴드 기간
  std_dev: 2.0             # 표준편차 배수

volatility_breakout:
  k: 0.5                   # 변동성 돌파 계수 (0.3 ~ 0.7)
